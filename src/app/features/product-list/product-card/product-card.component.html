<mat-card class="product-card">

  <mat-card-header>
    <div class="product-icon">
      <img [src]="getImage(product.code)" alt="{{ product.name }}" />
    </div>
  </mat-card-header>

  <mat-card-content>
    <h3 class="product-name">{{ product.name }}</h3>
    <p class="product-unit">per {{ product.unit }}</p>

    <div class="price-row">
      <span class="unit-price">€{{ product.unitPrice.toFixed(2) }}</span>
    </div>

    <app-offer-badge [offer]="product.activeOffer"></app-offer-badge>
  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" class="add-btn" (click)="onAdd()">
      <mat-icon>add_shopping_cart</mat-icon>
      Add to Cart
    </button>
  </mat-card-actions>

</mat-card>
