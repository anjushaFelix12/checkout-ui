<mat-toolbar color="primary" class="app-toolbar">

  <!-- Logo -->
  <div class="toolbar-left" routerLink="/">
    <span class="app-logo">🛒</span>
    <span class="app-title">Supermarket</span>
  </div>

  <nav class="nav-links">
    <a
      mat-button
      class="nav-link"
      routerLink="/"
      routerLinkActive="nav-link-active"
      [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>storefront</mat-icon>
      Products
    </a>
    <a
      mat-button
      class="nav-link"
      routerLink="/offers"
      routerLinkActive="nav-link-active">
      <mat-icon>local_offer</mat-icon>
      Weekly Offers
      <span class="offers-pill" *ngIf="offerCount > 0">{{ offerCount }}</span>
    </a>
  </nav>

  <span class="spacer"></span>

  <!-- Cart icon -->
  <button mat-icon-button class="cart-btn" (click)="openCart()" matTooltip="View Cart">
    <mat-icon
      [matBadge]="(itemCount$ | async) || null"
      matBadgeColor="accent"
      matBadgeSize="small">
      shopping_cart
    </mat-icon>
  </button>

</mat-toolbar>

<mat-drawer-container class="app-container" autosize>

  <mat-drawer-content class="app-content">
    <router-outlet></router-outlet>
  </mat-drawer-content>

  <mat-drawer #cartDrawer mode="over" position="end" class="cart-drawer">
    <app-cart (close)="closeCart()"></app-cart>
  </mat-drawer>

</mat-drawer-container>
